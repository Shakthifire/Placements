<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassForge — Password Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a0e;
    --surface: #0d1b22;
    --surface2: #112233;
    --accent: #00ffe0;
    --accent2: #ff3c6e;
    --accent3: #f7c948;
    --text: #d4eaf5;
    --muted: #4a7a96;
    --border: rgba(0,255,224,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,224,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,224,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(0,255,224,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 72px);
    letter-spacing: 6px;
    background: linear-gradient(90deg, var(--accent), #7df9ff, var(--accent));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    line-height: 1;
  }

  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  @keyframes shimmer {
    0% { background-position: 0% }
    100% { background-position: 200% }
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    animation: fadeUp 0.7s ease 0.1s both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  /* Password Display */
  .password-display {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 20px 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    min-height: 72px;
  }

  .password-display::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
  }

  #password-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    flex: 1;
    word-break: break-all;
    line-height: 1.5;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }

  #password-text.generating {
    opacity: 0.4;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,224,0.05);
  }

  .copy-btn.copied {
    border-color: var(--accent3);
    color: var(--accent3);
    background: rgba(247,201,72,0.08);
  }

  /* Strength Bar */
  .strength-section {
    margin-bottom: 28px;
  }

  .strength-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .strength-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  #strength-text {
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-weight: 500;
    letter-spacing: 2px;
    transition: color 0.4s;
  }

  .strength-bar-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  #strength-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.4s;
    width: 0%;
  }

  /* Length Slider */
  .setting-row {
    margin-bottom: 24px;
  }

  .setting-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .setting-name {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .setting-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--accent);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(0,255,224,0.4);
    transition: box-shadow 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 20px rgba(0,255,224,0.7);
  }

  /* Toggles */
  .toggles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .toggle-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .toggle-item:hover {
    border-color: rgba(0,255,224,0.3);
  }

  .toggle-item.active {
    border-color: rgba(0,255,224,0.4);
    background: rgba(0,255,224,0.05);
  }

  .toggle-label {
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    transition: color 0.2s;
  }

  .toggle-item.active .toggle-label {
    color: var(--accent);
  }

  .toggle-switch {
    width: 32px;
    height: 18px;
    background: rgba(255,255,255,0.08);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-item.active .toggle-switch {
    background: rgba(0,255,224,0.3);
  }

  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 12px; height: 12px;
    background: var(--muted);
    border-radius: 50%;
    transition: all 0.25s cubic-bezier(.4,0,.2,1);
  }

  .toggle-item.active .toggle-switch::after {
    left: 17px;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0,255,224,0.6);
  }

  /* Generate Button */
  .generate-btn {
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 6px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }

  .generate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: 0;
  }

  .generate-btn:hover::before {
    transform: scaleX(1);
  }

  .generate-btn:hover {
    color: var(--bg);
    box-shadow: 0 0 30px rgba(0,255,224,0.3);
  }

  .generate-btn span {
    position: relative;
    z-index: 1;
  }

  .generate-btn:active {
    transform: scale(0.98);
  }

  /* History */
  .history-section {
    margin-top: 24px;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .history-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--accent2); }

  #history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 160px;
    overflow-y: auto;
  }

  #history-list::-webkit-scrollbar { width: 4px; }
  #history-list::-webkit-scrollbar-track { background: transparent; }
  #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-item {
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 7px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: slideIn 0.3s ease;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .history-item:hover {
    border-color: var(--border);
  }

  .history-pw {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text);
    opacity: 0.6;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-copy {
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .history-item:hover .history-copy { color: var(--accent); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--accent3);
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 12px 24px;
    border-radius: 8px;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    z-index: 100;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">PassForge</div>
    <div class="tagline">Cryptographic Password Generator</div>
  </div>

  <div class="card">
    <!-- Password Output -->
    <div class="password-display">
      <div id="password-text">Click generate to forge your password</div>
      <button class="copy-btn" id="copy-btn" onclick="copyPassword()">COPY</button>
    </div>

    <!-- Strength -->
    <div class="strength-section">
      <div class="strength-label-row">
        <span class="strength-label">Strength</span>
        <span id="strength-text" style="color: var(--muted)">—</span>
      </div>
      <div class="strength-bar-track">
        <div id="strength-bar"></div>
      </div>
    </div>

    <!-- Length -->
    <div class="setting-row">
      <div class="setting-header">
        <span class="setting-name">Length</span>
        <span class="setting-value" id="length-display">16</span>
      </div>
      <input type="range" id="length-slider" min="4" max="64" value="16"
        oninput="updateLength(this.value)">
    </div>

    <!-- Toggles -->
    <div class="toggles-grid">
      <div class="toggle-item active" id="toggle-upper" onclick="toggleOption('upper')">
        <span class="toggle-label">UPPERCASE</span>
        <div class="toggle-switch"></div>
      </div>
      <div class="toggle-item active" id="toggle-lower" onclick="toggleOption('lower')">
        <span class="toggle-label">lowercase</span>
        <div class="toggle-switch"></div>
      </div>
      <div class="toggle-item active" id="toggle-numbers" onclick="toggleOption('numbers')">
        <span class="toggle-label">0-9 Numbers</span>
        <div class="toggle-switch"></div>
      </div>
      <div class="toggle-item active" id="toggle-symbols" onclick="toggleOption('symbols')">
        <span class="toggle-label">!@# Symbols</span>
        <div class="toggle-switch"></div>
      </div>
    </div>

    <!-- Generate Button -->
    <button class="generate-btn" onclick="generatePassword()">
      <span>⚡ FORGE PASSWORD</span>
    </button>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <span class="history-title">Recent Passwords</span>
      <button class="clear-btn" onclick="clearHistory()">CLEAR ALL</button>
    </div>
    <div id="history-list">
      <div style="text-align:center; color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 20px; letter-spacing: 2px;">
        NO HISTORY YET
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">COPIED TO CLIPBOARD</div>

<script>
  const options = { upper: true, lower: true, numbers: true, symbols: true };
  let currentPassword = '';
  const history = [];

  const CHARS = {
    upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:   'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  function updateLength(val) {
    document.getElementById('length-display').textContent = val;
  }

  function toggleOption(key) {
    const active = Object.values(options).filter(Boolean).length;
    if (options[key] && active === 1) return; // prevent all off
    options[key] = !options[key];
    document.getElementById('toggle-' + key).classList.toggle('active', options[key]);
  }

  function generatePassword() {
    const length = parseInt(document.getElementById('length-slider').value);
    let charset = '';
    const required = [];

    for (const [key, val] of Object.entries(options)) {
      if (val) {
        charset += CHARS[key];
        required.push(CHARS[key][Math.floor(Math.random() * CHARS[key].length)]);
      }
    }

    if (!charset) return;

    // Animate
    const el = document.getElementById('password-text');
    el.classList.add('generating');

    let iterations = 0;
    const maxIter = 12;
    const interval = setInterval(() => {
      let fake = '';
      for (let i = 0; i < length; i++) {
        fake += charset[Math.floor(Math.random() * charset.length)];
      }
      el.textContent = fake;
      iterations++;
      if (iterations >= maxIter) {
        clearInterval(interval);
        // Build real password
        let pw = [...required];
        for (let i = required.length; i < length; i++) {
          pw.push(charset[Math.floor(Math.random() * charset.length)]);
        }
        // Shuffle
        for (let i = pw.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [pw[i], pw[j]] = [pw[j], pw[i]];
        }
        currentPassword = pw.join('');
        el.textContent = currentPassword;
        el.classList.remove('generating');
        updateStrength(currentPassword);
        addToHistory(currentPassword);
        document.getElementById('copy-btn').textContent = 'COPY';
        document.getElementById('copy-btn').classList.remove('copied');
      }
    }, 40);
  }

  function updateStrength(pw) {
    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (pw.length >= 20) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const bar = document.getElementById('strength-bar');
    const text = document.getElementById('strength-text');

    let width, color, label;
    if (score <= 2) {
      width = '20%'; color = '#ff3c6e'; label = 'WEAK';
    } else if (score <= 4) {
      width = '50%'; color = '#f7c948'; label = 'FAIR';
    } else if (score <= 6) {
      width = '75%'; color = '#00ffe0'; label = 'STRONG';
    } else {
      width = '100%'; color = '#7df9ff'; label = 'FORTRESS';
    }

    bar.style.width = width;
    bar.style.background = color;
    text.textContent = label;
    text.style.color = color;
  }

  function addToHistory(pw) {
    history.unshift(pw);
    if (history.length > 8) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    if (history.length === 0) {
      list.innerHTML = `<div style="text-align:center; color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 20px; letter-spacing: 2px;">NO HISTORY YET</div>`;
      return;
    }
    list.innerHTML = history.map(pw => `
      <div class="history-item" onclick="copyText('${pw.replace(/'/g, "\\'")}')">
        <span class="history-pw">${pw}</span>
        <span class="history-copy">COPY</span>
      </div>
    `).join('');
  }

  function clearHistory() {
    history.length = 0;
    renderHistory();
  }

  function copyPassword() {
    if (!currentPassword) return;
    copyText(currentPassword);
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ DONE';
    btn.classList.add('copied');
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
    showToast();
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Generate on load
  generatePassword();
</script>
</body>
</html>
